    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121213;
            color: #ffffff;
            overflow-x: hidden;
        }
        @keyframes flip-absent {
            0% { transform: rotateX(0); background-color: transparent; border-color: #3a3a3c; }
            45% { transform: rotateX(90deg); background-color: transparent; border-color: #3a3a3c; }
            55% { transform: rotateX(90deg); background-color: #3a3a3c; border-color: #3a3a3c; }
            100% { transform: rotateX(0); background-color: #3a3a3c; border-color: #3a3a3c; }
        }
        @keyframes flip-present {
            0% { transform: rotateX(0); background-color: transparent; border-color: #3a3a3c; }
            45% { transform: rotateX(90deg); background-color: transparent; border-color: #3a3a3c; }
            55% { transform: rotateX(90deg); background-color: #b59f3b; border-color: #b59f3b; }
            100% { transform: rotateX(0); background-color: #b59f3b; border-color: #b59f3b; }
        }
        @keyframes flip-correct {
            0% { transform: rotateX(0); background-color: transparent; border-color: #3a3a3c; }
            45% { transform: rotateX(90deg); background-color: transparent; border-color: #3a3a3c; }
            55% { transform: rotateX(90deg); background-color: #538d4e; border-color: #538d4e; }
            100% { transform: rotateX(0); background-color: #538d4e; border-color: #538d4e; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .reveal-absent { animation: flip-absent 0.6s ease-in forwards; }
        .reveal-present { animation: flip-present 0.6s ease-in forwards; }
        .reveal-correct { animation: flip-correct 0.6s ease-in forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* Ensure text stays white even during animation transitions */
        .reveal-absent, .reveal-present, .reveal-correct {
            color: white !important;
        }
    </style>
